# --- Fonts ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
disable_ligatures cursor

# --- Cursor & Mouse ---
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0
shell_integration enabled
copy_on_select yes
focus_follows_mouse yes

# --- Window Layout ---
remember_window_size  yes
initial_window_width  1000
initial_window_height 650
window_padding_width 8
confirm_os_window_close 0

# --- Performance & Graphics ---
repaint_delay 10
input_delay 3
sync_to_monitor yes
background_opacity 0.3
background_blur 1

# --- Tab Bar ---
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold
inactive_tab_font_style normal

# --- Terminal Bell ---
enable_audio_bell no
visual_bell_duration 0.1

# --- Colors (Tokyo Night Storm) ---
foreground            #c0caf5
background            #1a1b26
selection_foreground  #1a1b26
selection_background  #7aa2f7
url_color             #73daca
# Black
color0 #15161e
color8 #414868
# Red
color1 #f7768e
color9 #f7768e
# Green
color2  #9ece6a
color10 #9ece6a
# Yellow
color3  #e0af68
color11 #e0af68
# Blue
color4  #7aa2f7
color12 #7aa2f7
# Magenta
color5  #bb9af7
color13 #bb9af7
# Cyan
color6  #7dcfff
color14 #7dcfff
# White
color7  #a9b1d6
color15 #c0caf5

# --- Keyboard Shortcuts ---
# Map Ctrl+Shift+h to open the entire scrollback buffer in Neovim
scrollback_pager nvim -c "set signcolumn=no showtabline=0" -c "silent! %s/\u001b\[[0-9;]*m//g" -c "normal G" -
map ctrl+shift+h show_scrollback

# Quick-select and open URLs
map ctrl+shift+u kitten hints --type url

# Quick-select and copy paths to clipboard
map ctrl+shift+p kitten hints --type path --program @

# Reload config on the fly
map ctrl+shift+f5 load_config_file
