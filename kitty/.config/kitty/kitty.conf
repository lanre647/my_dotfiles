include ~/.cache/wal/colors-kitty.conf
# --- Fonts ---
font_family      JetBrainsMono Nerd Font
# font_family      Noto Sans
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
modify_font line_height 110%
disable_ligatures cursor
# --- Cursor & Mouse ---
cursor #88C0D0
cursor_text_color #2E3440
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0
shell_integration enabled
copy_on_select yes
focus_follows_mouse yes
# --- Window Layout ---
remember_window_size  yes
initial_window_width  1000
initial_window_height 650
window_padding_width 6
confirm_os_window_close 0
# --- Performance & Graphics ---
repaint_delay 10
input_delay 3
sync_to_monitor yes
background_opacity 0.6
dynamic_background_opacity yes
background_blur 1
# --- Tab Bar ---
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold
inactive_tab_font_style normal
# --- URL Handling ---
open_url_with default
detect_urls yes
underline_hyperlinks always
# --- Layout ---
enabled_layouts tall,stack,fat,grid
# --- Terminal Bell ---
enable_audio_bell no
visual_bell_duration 0.1
# --- Colors (Nord) ---
foreground            #D8DEE9
background            #2E3440
selection_foreground  #2E3440
selection_background  #88C0D0
url_color             #81A1C1
# Black
color0  #3B4252
color8  #4C566A
# Red
color1  #BF616A
color9  #BF616A
# Green
color2  #A3BE8C
color10 #A3BE8C
# Yellow
color3  #EBCB8B
color11 #EBCB8B
# Blue
color4  #81A1C1
color12 #81A1C1
# Magenta
color5  #B48EAD
color13 #B48EAD
# Cyan
color6  #88C0D0
color14 #8FBCBB
# White
color7  #E5E9F0
color15 #ECEFF4
# --- Keyboard Shortcuts ---
# Map Ctrl+Shift+h to open the entire scrollback buffer in Neovim
scrollback_pager nvim -c "set signcolumn=no showtabline=0" -c "silent! %s/\u001b\[[0-9;]*m//g" -c "normal G" -
scrollback_lines 2000
map ctrl+shift+h show_scrollback
# --- Tab Mappings ---
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+n next_tab
map alt+p previous_tab
# Quick-select and open URLs
map ctrl+shift+u kitten hints --type url
# Quick-select and copy paths to clipboard
map ctrl+shift+p kitten hints --type path --program @
# Reload config on the fly
map ctrl+shift+f5 load_config_file
