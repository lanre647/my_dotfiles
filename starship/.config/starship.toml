# =========================================
# рҹҡҖ Elite Powerline Gruvbox MAX
# =========================================

command_timeout = 400
scan_timeout = 25
add_newline = true
palette = "gruvbox_power_bold"

# =========================================
# рҹ§¬ MASTER FORMAT (boxed powerline)
# =========================================

format = """\
[оӮ¶](fg:bg0)\
$os\
$username\
[оӮ°](fg:green bg:blue)\
$directory\
[оӮ°](fg:blue bg:orange)\
$git_branch\
$git_status\
[оӮ°](fg:orange bg:bg1)\
$fill\
$aws\
$kubernetes\
$docker_context\
$cmd_duration\
$time\
$battery\
$memory_usage\
[оӮҙ](fg:bg1)\
$line_break\
$status\
$character\
$python\
$nodejs\
$conda\
"""

# =========================================
# рҹҺЁ Palette
# =========================================

[palettes.gruvbox_power_bold]
bg0 = "#282828"
bg1 = "#3c3836"
green = "#8ec07c"
blue = "#83a598"
orange = "#fe8019"
yellow = "#fabd2f"
red = "#fb4934"
aqua = "#8ec07c"
purple = "#d3869b"
fg0 = "#fbf1c7"

# =========================================
# рҹ–Ҙ OS (smarter icon)
# =========================================

[os]
disabled = false
style = "bg:bg0 fg:green bold"
format = "[ у°ҢҪ ]($style)"

# =========================================
# рҹ‘Ө Username
# =========================================

[username]
show_always = true
style_user = "bg:bg0 fg:green bold"
style_root = "bg:bg0 fg:red bold"
format = "[ пҠҪ $user ]($style)"

# =========================================
# рҹ“Ғ Directory
# =========================================

[directory]
style = "bg:blue fg:bg0 bold"
format = "[ пҒ» $path ]($style)"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "вҖҰ/"

# =========================================
# рҹҢҝ Git Branch
# =========================================

[git_branch]
symbol = "пҗҳ "
style = "bg:orange fg:bg0 bold"
format = "[ $symbol$branch ]($style)"

# =========================================
# рҹ§  Git Heatmap (ahead/behind bars)
# =========================================

[git_status]
style = "bg:orange fg:bg0 bold"
format = "[$all_status$ahead_behind ]($style)"

ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"

# =========================================
# вҳҒпёҸ AWS (danger aware)
# =========================================

[aws]
symbol = "оҢҪ "
format = "[ $symbol$profile ]($style)"
style = "bg:yellow fg:bg0 bold"
disabled = false

[[aws.profile_aliases]]
profile_pattern = "(?i)prod|production|live"
alias = "рҹҡЁPROD"

# =========================================
# вҳёпёҸ Kubernetes (cluster color intelligence)
# =========================================

[kubernetes]
symbol = "уұғҫ "
disabled = false
format = "[ $symbol$context(::$namespace) ]($style)"
style = "bg:purple fg:bg0 bold"

# вңӮпёҸ smart shortening
[kubernetes.context_aliases]
".*eks.*" = "eks"
".*gke.*" = "gke"
".*aks.*" = "aks"
".*minikube.*" = "mini"

# рҹҡЁ PROD вҖ” blinking red
[[kubernetes.contexts]]
context_pattern = "(?i)prod|production|live|main|prd"
style = "bg:red fg:bg0 bold blink"
symbol = "пҒұ "

# рҹӣ°пёҸ staging вҖ” yellow
[[kubernetes.contexts]]
context_pattern = "(?i)stage|staging|test"
style = "bg:yellow fg:bg0 bold"
symbol = "у°ҷЁ "

# рҹ§Ә dev вҖ” green calm
[[kubernetes.contexts]]
context_pattern = "(?i)dev|local|minikube"
style = "bg:green fg:bg0 bold"
symbol = "у°Ң— "

# =========================================
# рҹҗі Docker
# =========================================

[docker_context]
symbol = "пҢҲ "
style = "bg:aqua fg:bg0 bold"
format = "[ $symbol$context ]($style)"
disabled = false

# =========================================
# вҸұ Duration (heat feel)
# =========================================

[cmd_duration]
min_time = 1000
style = "bg:bg1 fg:orange bold"
format = "[ у°”ҹ $duration ]($style)"

# =========================================
# вҸ° Time
# =========================================

[time]
disabled = false
time_format = "%R"
style = "bg:bg1 fg:aqua bold"
format = "[ у°Ҙ” $time ]($style)"

# =========================================
# рҹ”Ӣ Battery
# =========================================

[battery]
disabled = false
full_symbol = "у°Ғ№ "
charging_symbol = "у°Ӯ„ "
discharging_symbol = "у°Ӯғ "
format = "[ $symbol$percentage ]($style)"
style = "bg:bg1 fg:green bold"

[[battery.display]]
threshold = 25
style = "bg:bg1 fg:red bold"

# =========================================
# рҹ§  Memory
# =========================================

[memory_usage]
disabled = false
threshold = 85
symbol = "у°Қӣ "
style = "bg:bg1 fg:yellow bold"
format = "[ $symbol$ram ]($style)"

# =========================================
# рҹҢҲ Dynamic Exit Code Indicator
# =========================================

[status]
disabled = false
symbol = "вң– "
success_symbol = ""
style = "bold fg:red"
format = "[$symbol$status]($style) "

# =========================================
# рҹҺҜ Character
# =========================================

[character]
success_symbol = "[вқҜ](bold fg:green)"
error_symbol = "[вқҜ](bold fg:red)"
vimcmd_symbol = "[вқ®](bold fg:yellow)"

# =========================================
# рҹҗҚ Python
# =========================================

[python]
symbol = "оҳҶ "
style = "bg:yellow fg:bg0 bold"
format = "[ $symbol($version) ]($style)"

# =========================================
# рҹҹў Node
# =========================================

[nodejs]
symbol = "оңҳ "
style = "bg:green fg:bg0 bold"
format = "[ $symbol($version) ]($style)"

# =========================================
# рҹ§Ә Conda
# =========================================

[conda]
symbol = "п„Ң "
style = "bg:purple fg:bg0 bold"
format = "[ $symbol$environment ]($style)"

# =========================================
# filler
# =========================================

[fill]
symbol = " "
