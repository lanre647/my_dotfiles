# =========================================
# рҹҡҖ Elite Powerline Gruvbox Prompt (FIXED)
# =========================================

format = """\
[оӮ¶](fg:bg0)\
$os\
$username\
[оӮ°](fg:green bg:blue)\
$directory\
[оӮ°](fg:blue bg:orange)\
$git_branch\
$git_status\
[оӮ°](fg:orange bg:bg0)\
$fill\
$aws\
$kubernetes\
$docker_context\
$cmd_duration\
$time\
$battery\
$memory_usage\
[оӮҙ ](fg:bg0)\
$line_break\
$character\
$python\
$nodejs\
$conda\
"""

scan_timeout = 40
command_timeout = 400
add_newline = true
palette = "gruvbox_power_bold"

# =========================================
# рҹҺЁ Palette
# =========================================

[palettes.gruvbox_power_bold]
bg0 = "#282828"
bg1 = "#3c3836"
green = "#8ec07c"
blue = "#83a598"
orange = "#fe8019"
yellow = "#fabd2f"
red = "#fb4934"
aqua = "#8ec07c"
purple = "#d3869b"
fg0 = "#fbf1c7"

# =========================================
# рҹ’» OS
# =========================================

[os]
disabled = false
style = "bg:bg0 fg:green bold"
format = "[ рҹ–Ҙ ]($style)"

# =========================================
# рҹ‘Ө Username
# =========================================

[username]
show_always = true
style_user = "bg:bg0 fg:green bold"
style_root = "bg:bg0 fg:red bold"
format = "[ п“ҝ $user ]($style)"

# =========================================
# рҹ“Ғ Directory
# =========================================

[directory]
style = "bg:blue fg:bg0 bold"
format = "[ пҒј $path ]($style)"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "вҖҰ/"

# =========================================
# рҹҢҝ Git
# =========================================

[git_branch]
symbol = "оңҘ "
style = "bg:orange fg:bg0 bold"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:orange fg:bg0 bold"
format = "[$all_status$ahead_behind ]($style)"

# =========================================
# вҳҒпёҸ AWS (SINGLE BLOCK вҖ” FIXED)
# =========================================

[aws]
symbol = "вҳҒпёҸ "
format = "[ $symbol$profile ]($style)"
style = "bg:yellow fg:bg0 bold"
disabled = false

# рҹҡЁ highlight prod-like profiles
[aws.profile_aliases]
production = "prod"
prod = "prod"

# =========================================
# вҳёпёҸ Kubernetes (SMART + DANGER)
# =========================================

[kubernetes]
symbol = "вҳёпёҸ "
disabled = false
format = "[ $symbol$context(::$namespace) ]($style)"
style = "bg:purple fg:bg0 bold"

# вңӮпёҸ smart shortening
[kubernetes.context_aliases]
".*eks.*" = "eks"
".*gke.*" = "gke"
".*aks.*" = "aks"

# рҹҡЁ prod detection
[[kubernetes.contexts]]
context_pattern = "(?i)prod|production|live|main|prd"
style = "bg:red fg:bg0 bold blink"
symbol = "рҹҡЁвҳёпёҸ "

# =========================================
# рҹҗі Docker
# =========================================

[docker_context]
symbol = "рҹҗі "
style = "bg:aqua fg:bg0 bold"
format = "[ $symbol$context ]($style)"
disabled = false

# =========================================
# рҹ§  Memory
# =========================================

[memory_usage]
disabled = false
threshold = 85
symbol = "у°Қӣ "
style = "bg:bg1 fg:yellow bold"
format = "[ $symbol$ram ]($style)"

# =========================================
# рҹ”Ӣ Battery
# =========================================

[battery]
disabled = false
full_symbol = "рҹ”Ӣ "
charging_symbol = "вҡЎ "
discharging_symbol = "рҹ”Ӣ "
format = "[ $symbol$percentage ]($style)"
style = "bg:bg1 fg:green bold"

[[battery.display]]
threshold = 25
style = "bg:bg1 fg:red bold"

# =========================================
# вҸұ Duration
# =========================================

[cmd_duration]
min_time = 1000
style = "bg:bg1 fg:orange bold"
format = "[ вҸұ $duration ]($style)"

# =========================================
# вҸ° Time
# =========================================

[time]
disabled = false
time_format = "%R"
style = "bg:bg1 fg:aqua bold"
format = "[ рҹ•’ $time ]($style)"

# =========================================
# рҹҺҜ Character
# =========================================

[character]
success_symbol = "[вқҜ](bold fg:green)"
error_symbol = "[вқҜ](bold fg:red)"
vimcmd_symbol = "[вқ®](bold fg:yellow)"

# =========================================
# рҹҗҚ Python
# =========================================

[python]
symbol = "рҹҗҚ "
style = "bg:yellow fg:bg0 bold"
format = "[ $symbol($version) ]($style)"

# =========================================
# рҹҹў Node
# =========================================

[nodejs]
symbol = "рҹҹў "
style = "bg:green fg:bg0 bold"
format = "[ $symbol($version) ]($style)"

# =========================================
# рҹ§Ә Conda
# =========================================

[conda]
symbol = "рҹ§Ә "
style = "bg:purple fg:bg0 bold"
format = "[ $symbol$environment ]($style)"

# =========================================
# filler
# =========================================

[fill]
symbol = " "
