# =========================================
# 🚀 Elite Powerline Gruvbox MAX (FIXED)
# =========================================

command_timeout = 400
scan_timeout = 25
add_newline = true
palette = "gruvbox_power_bold"

# =========================================
# 🧬 MASTER FORMAT (boxed powerline)
# =========================================

format = """\
[](fg:bg0)\
$os\
$username\
[](fg:green bg:blue)\
$directory\
[](fg:blue bg:orange)\
$git_branch\
$git_status\
[](fg:orange bg:bg1)\
$fill\
$aws\
$kubernetes\
$docker_context\
$cmd_duration\
$time\
$battery\
$memory_usage\
[](fg:bg1)\
$line_break\
$status\
$character\
$python\
$nodejs\
$conda\
"""

# =========================================
# 🎨 Palette
# =========================================

[palettes.gruvbox_power_bold]
bg0 = "#282828"
bg1 = "#3c3836"
green = "#8ec07c"
blue = "#83a598"
orange = "#fe8019"
yellow = "#fabd2f"
red = "#fb4934"
aqua = "#8ec07c"
purple = "#d3869b"
fg0 = "#fbf1c7"

# =========================================
# 🖥 OS
# =========================================

[os]
disabled = false
style = "bg:bg0 fg:green bold"
format = "[ 󰌽 ]($style)"

# =========================================
# 👤 Username
# =========================================

[username]
show_always = true
style_user = "bg:bg0 fg:green bold"
style_root = "bg:bg0 fg:red bold"
format = "[  $user ]($style)"

# =========================================
# 📁 Directory
# =========================================

[directory]
style = "bg:blue fg:bg0 bold"
format = "[  $path ]($style)"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

# =========================================
# 🌿 Git Branch
# =========================================

[git_branch]
symbol = " "
style = "bg:orange fg:bg0 bold"
format = "[ $symbol$branch ]($style)"

# =========================================
# 🧠 Git Status
# =========================================

[git_status]
style = "bg:orange fg:bg0 bold"
format = "[$all_status$ahead_behind ]($style)"

ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

# =========================================
# ☁️ AWS (FIXED)
# =========================================

[aws]
symbol = " "
format = "[ $symbol$profile ]($style)"
style = "bg:yellow fg:bg0 bold"
disabled = false

[aws.profile_aliases]
"(?i)prod|production|live" = "🚨PROD"
"(?i)stage|staging|test" = "🟡STAGE"
"(?i)dev|sandbox|local" = "🟢DEV"

# =========================================
# ☸️ Kubernetes
# =========================================

[kubernetes]
symbol = "󱃾 "
disabled = false
format = "[ $symbol$context(::$namespace) ]($style)"
style = "bg:purple fg:bg0 bold"

[kubernetes.context_aliases]
".*eks.*" = "eks"
".*gke.*" = "gke"
".*aks.*" = "aks"
".*minikube.*" = "mini"

[[kubernetes.contexts]]
context_pattern = "(?i)prod|production|live|main|prd"
style = "bg:red fg:bg0 bold blink"
symbol = " "

[[kubernetes.contexts]]
context_pattern = "(?i)stage|staging|test"
style = "bg:yellow fg:bg0 bold"
symbol = "󰙨 "

[[kubernetes.contexts]]
context_pattern = "(?i)dev|local|minikube"
style = "bg:green fg:bg0 bold"
symbol = "󰌗 "

# =========================================
# 🐳 Docker
# =========================================

[docker_context]
symbol = " "
style = "bg:aqua fg:bg0 bold"
format = "[ $symbol$context ]($style)"
disabled = false

# =========================================
# ⏱ Duration
# =========================================

[cmd_duration]
min_time = 1000
style = "bg:bg1 fg:orange bold"
format = "[ 󰔟 $duration ]($style)"

# =========================================
# ⏰ Time
# =========================================

[time]
disabled = false
time_format = "%R"
style = "bg:bg1 fg:aqua bold"
format = "[ 󰥔 $time ]($style)"

# =========================================
# 🔋 Battery
# =========================================

[battery]
disabled = false
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
format = "[ $symbol$percentage ]($style)"
style = "bg:bg1 fg:green bold"

[[battery.display]]
threshold = 25
style = "bg:bg1 fg:red bold"

# =========================================
# 🧠 Memory
# =========================================

[memory_usage]
disabled = false
threshold = 85
symbol = "󰍛 "
style = "bg:bg1 fg:yellow bold"
format = "[ $symbol$ram ]($style)"

# =========================================
# 🌈 Status
# =========================================

[status]
disabled = false
symbol = "✖ "
success_symbol = ""
style = "bold fg:red"
format = "[$symbol$status]($style) "

# =========================================
# 🎯 Character
# =========================================

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:yellow)"

# =========================================
# 🐍 Python
# =========================================

[python]
symbol = " "
style = "bg:yellow fg:bg0 bold"
format = "[ $symbol($version) ]($style)"

# =========================================
# 🟢 Node
# =========================================

[nodejs]
symbol = " "
style = "bg:green fg:bg0 bold"
format = "[ $symbol($version) ]($style)"

# =========================================
# 🧪 Conda
# =========================================

[conda]
symbol = " "
style = "bg:purple fg:bg0 bold"
format = "[ $symbol$environment ]($style)"

# =========================================
# filler
# =========================================

[fill]
symbol = " "
