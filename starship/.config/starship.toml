# =========================================
# 🚀 Elite Powerline Cyberpunk Neon
# =========================================

command_timeout = 400
scan_timeout = 25
add_newline = true
palette = "cyberpunk_neon"

# =========================================
# 🧬 MASTER FORMAT (boxed powerline)
# =========================================

format = """\
[](fg:bg0)\
$os\
$username\
[](fg:neon_green bg:neon_blue)\
$directory\
[](fg:neon_blue bg:neon_purple)\
$git_branch\
$git_status\
[](fg:neon_purple bg:bg1)\
$fill\
$aws\
$kubernetes\
$docker_context\
$cmd_duration\
$time\
$battery\
$memory_usage\
[](fg:bg1)\
$line_break\
$status\
$character\
$python\
$nodejs\
$conda\
"""

# =========================================
# 🎨 Cyberpunk Neon Palette
# =========================================

[palettes.cyberpunk_neon]

bg0 = "#0b0f1a"
bg1 = "#141a2a"

neon_green = "#39ff14"
neon_blue = "#00d9ff"
neon_purple = "#9d00ff"
neon_pink = "#ff2bd6"
neon_yellow = "#ffe600"
neon_red = "#ff3b3b"
neon_aqua = "#00ffc6"

fg0 = "#e6f1ff"

# =========================================
# 🖥 OS
# =========================================

[os]
disabled = false
style = "bg:bg0 fg:neon_green bold"
format = "[ 󰌽 ]($style)"

# =========================================
# 👤 Username
# =========================================

[username]
show_always = true
style_user = "bg:bg0 fg:neon_green bold"
style_root = "bg:bg0 fg:neon_red bold"
format = "[  $user ]($style)"

# =========================================
# 📁 Directory
# =========================================

[directory]
style = "bg:neon_blue fg:bg0 bold"
format = "[  $path ]($style)"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

# =========================================
# 🌿 Git Branch
# =========================================

[git_branch]
symbol = " "
style = "bg:neon_purple fg:bg0 bold"
format = "[ $symbol$branch ]($style)"

# =========================================
# 🧠 Git Status
# =========================================

[git_status]
style = "bg:neon_purple fg:bg0 bold"
format = "[$all_status$ahead_behind ]($style)"

ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

# =========================================
# ☁️ AWS
# =========================================

[aws]
symbol = " "
format = "[ $symbol$profile ]($style)"
style = "bg:neon_yellow fg:bg0 bold"
disabled = false

[aws.profile_aliases]
"(?i)prod|production|live" = "🚨PROD"
"(?i)stage|staging|test" = "🟡STAGE"
"(?i)dev|sandbox|local" = "🟢DEV"

# =========================================
# ☸️ Kubernetes
# =========================================

[kubernetes]
symbol = "󱃾 "
disabled = false
format = "[ $symbol$context(::$namespace) ]($style)"
style = "bg:neon_pink fg:bg0 bold"

[kubernetes.context_aliases]
".*eks.*" = "eks"
".*gke.*" = "gke"
".*aks.*" = "aks"
".*minikube.*" = "mini"

[[kubernetes.contexts]]
context_pattern = "(?i)prod|production|live|main|prd"
style = "bg:neon_red fg:bg0 bold blink"
symbol = " "

[[kubernetes.contexts]]
context_pattern = "(?i)stage|staging|test"
style = "bg:neon_yellow fg:bg0 bold"
symbol = "󰙨 "

[[kubernetes.contexts]]
context_pattern = "(?i)dev|local|minikube"
style = "bg:neon_green fg:bg0 bold"
symbol = "󰌗 "

# =========================================
# 🐳 Docker
# =========================================

[docker_context]
symbol = " "
style = "bg:neon_aqua fg:bg0 bold"
format = "[ $symbol$context ]($style)"
disabled = false

# =========================================
# ⏱ Duration
# =========================================

[cmd_duration]
min_time = 1000
style = "bg:bg1 fg:neon_purple bold"
format = "[ 󰔟 $duration ]($style)"

# =========================================
# ⏰ Time
# =========================================

[time]
disabled = false
time_format = "%R"
style = "bg:bg1 fg:neon_aqua bold"
format = "[ 󰥔 $time ]($style)"

# =========================================
# 🔋 Battery
# =========================================

[battery]
disabled = false
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
format = "[ $symbol$percentage ]($style)"
style = "bg:bg1 fg:neon_green bold"

[[battery.display]]
threshold = 25
style = "bg:bg1 fg:neon_red bold"

# =========================================
# 🧠 Memory
# =========================================

[memory_usage]
disabled = false
threshold = 85
symbol = "󰍛 "
style = "bg:bg1 fg:neon_yellow bold"
format = "[ $symbol$ram ]($style)"

# =========================================
# 🌈 Status
# =========================================

[status]
disabled = false
symbol = "✖ "
success_symbol = ""
style = "bold fg:neon_red"
format = "[$symbol$status]($style) "

# =========================================
# 🎯 Character
# =========================================

[character]
success_symbol = "[❯](bold fg:neon_aqua)"
error_symbol = "[❯](bold fg:neon_red)"
vimcmd_symbol = "[❮](bold fg:neon_yellow)"

# =========================================
# 🐍 Python
# =========================================

[python]
symbol = " "
style = "bg:neon_yellow fg:bg0 bold"
format = "[ $symbol($version) ]($style)"

# =========================================
# 🟢 Node
# =========================================

[nodejs]
symbol = " "
style = "bg:neon_green fg:bg0 bold"
format = "[ $symbol($version) ]($style)"

# =========================================
# 🧪 Conda
# =========================================

[conda]
symbol = " "
style = "bg:neon_purple fg:bg0 bold"
format = "[ $symbol$environment ]($style)"

# =========================================
# filler
# =========================================

[fill]
symbol = " "
