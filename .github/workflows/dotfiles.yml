name: dotfiles-ci

on:
  push:
  pull_request:

jobs:
  stow-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y stow zsh tmux vim

      - name: Dry-run stow
        run: |
          mkdir -p "$HOME"
          stow -n -v -R git tmux vim zsh config
