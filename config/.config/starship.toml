scan_timeout = 500
add_newline = true
palette = "normal"

[palettes.normal]
arrow = "#333533"
os = "#16f4d0"
os_admin = "#e4ff1a"
directory = "#9ffff5"
git = "#f17f29"
python = "#edf67d"
conda = "#70e000"
node = "#a5e6ba"
java = "#F86279"
rust = "#ffdac6"
clang = "#caf0f8"
duration = "#ce4257"
memory = "#8d99ae"
heap = "#f4a261"
heap_warn = "#ef233c" 
text_light = "#26272A"
time = "#bdfffd"

[sudo]
symbol = "¾▒Éŗ "
style = "bold os_admin"
format = "[$symbol]($style)"
disabled = false

[username]
show_always = true
style_user = "bold os"
style_root = "bold os_admin"
format = " [$user]($style) "

[status]
symbol = "Ō£ś "
style = "bold fg:heap_warn"
format = "[$symbol$common_meaning$signal_name]($style) "
map_symbol = true
disabled = false

[time]
disabled = false
time_format = "%R" # 24-hour clock
style = "bold fg:time"
format = "at [¾▒æł $time]($style) "

[custom.node_heap]
description = "Show Node.js heap usage"
command = """
node -e "
  const heap = Math.round(process.memoryUsage().heapUsed / 1024 / 1024);
  process.stdout.write(heap > 1000 ? '’ü▒ ' + heap + 'MB' : heap + 'MB');
"
"""
detect_files = ["package.json", "node_modules"]
style = "bold fg:heap"
format = "heap [$output]($style) "
disabled = false

[memory_usage]
disabled = false
threshold = 75 
symbol = "¾░Ć” RAM "
style = "bold fg:heap_warn"
