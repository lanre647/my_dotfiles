# ==========================
# ===  General Settings  ===
# ==========================
set -g default-terminal "tmux-256color"
set -g history-limit 20000
set -g buffer-limit 20
set -sg escape-time 0
set -g display-time 1500
set -g repeat-time 300
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g renumber-windows on
set -g assume-paste-time 10
set -g focus-events on
set -g terminal-overrides ',*:Tc'

# ==========================
# ===   TPM PLUGINS      ===
# ==========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ==========================
# ===   Key Bindings     ===
# ==========================
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind r source-file ~/.tmux.conf \; display "󰑓 Config Reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind S setw synchronize-panes \; display "Sync panes: #{?pane_synchronized,󰓦 on,󰓦 off}"

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind s run "tmux list-sessions -F '#S' | fzf | xargs tmux switch-client -t"
bind < swap-pane -U
bind > swap-pane -D

setw -g automatic-rename on

# =====================================
# ===    THEME: CATPPUCCIN MOCHA    ===
# =====================================
set -g @thm_bg "#1e1e2e"
set -g @thm_fg "#cdd6f4"
set -g @thm_cyan "#89dceb"
set -g @thm_blue "#89b4fa"
set -g @thm_orange "#fab387"
set -g @thm_magenta "#cba6f7"
set -g @thm_gray "#313244"

set -g @prefix_highlight_prefix '⚡'
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg "#{@thm_orange}"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=black,bg=#{@thm_magenta},bold"

set -g pane-border-style "fg=#{@thm_gray}"
set -g pane-active-border-style "fg=#{@thm_blue}"
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#{@thm_bg},fg=#{@thm_fg}"

set -g status-left-length 60
set -g status-left "#[fg=#{@thm_bg},bg=#{@thm_blue},bold] 󱂬 #S #[fg=#{@thm_blue},bg=#{@thm_bg}] "

set -g status-right-length 100
set -g status-right "#{prefix_highlight} #[fg=#{@thm_fg}]󰁹 #{battery_percentage} #[fg=#{@thm_gray}]#[fg=#{@thm_fg},bg=#{@thm_gray}] 󰃭 %d-%b #[fg=#{@thm_cyan},bg=#{@thm_gray}]#[fg=#{@thm_bg},bg=#{@thm_cyan},bold] 󱑎 %H:%M "

set -g window-status-format "#[fg=#{@thm_fg},bg=default] 󰉋 #I:#W "
set -g window-status-current-format "#[fg=#{@thm_bg},bg=#{@thm_orange},bold]  #I:#W #[fg=#{@thm_orange},bg=default]"

set -g message-style "bg=#{@thm_cyan},fg=#{@thm_bg},bold"

# Initialize TPM (Keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

# ==========================
# ===   TMUX CHEATSHEET  ===
# ==========================
#
# PREFIX Key :: Ctrl-a (⚡ indicator shows when active)
#
# --- Plugin Management ---
# 󰚰 Install Plugins      :: PREFIX + I
# 󰚰 Update Plugins       :: PREFIX + U
#
# --- Sessions & Config ---
# 󰑓 Reload Config        :: PREFIX + r
# 󰏫 Rename Session       :: PREFIX + $
# 󱊄 Detach Session       :: PREFIX + d
#  FZF Session Switcher :: PREFIX + s
#
# --- Window Management ---
# 󰝒 Create Window        :: PREFIX + c
# 󰏫 Rename Window        :: PREFIX + ,
# 󰆴 Close Window         :: PREFIX + &
# 󰮳 Previous/Next        :: PREFIX + p / n
# 󰒫 Select Window 1-9    :: PREFIX + 1-9
#
# --- Pane Management ---
# 󰤼 Split Vert/Horiz     :: PREFIX + | / -
# 󰊓 Zoom/Unzoom Pane     :: PREFIX + z
# 󰆴 Kill Pane            :: PREFIX + x
# 󰓦 Sync Panes Toggle    :: PREFIX + S
# 󱊄 Quick Swap Panes    :: PREFIX + < / >
#
# --- Navigation (Vim) ---
# 󰜶 Move                 :: PREFIX + h, j, k, l
# 󰜴 Resize (Step 5)      :: PREFIX + H, J, K, L
# 󰜴 Resize (Step 20)     :: PREFIX + M-H, M-L
#
# --- Copy Mode (Vim) ---
# 󰇚 Enter Copy Mode      :: PREFIX + [
# 󰅍 Start Selection      :: v
# 󰅍 Copy Selection       :: y
# 󰅏 Paste Buffer         :: PREFIX + ]
#
# --- Legend ---
# 󱂬 : Session    : Active Window   󰉋 : Inactive Window
# ⚡ : Prefix On  󰁹 : Battery         󱑎 : Time

