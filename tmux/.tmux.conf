# ==========================
# ===  General Settings  ===
# ==========================
set -g default-terminal "screen-256color"
set -g history-limit 20000
set -g buffer-limit 20
set -sg escape-time 0
set -g display-time 1500
set -g repeat-time 300
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g renumber-windows on

# ==========================
# ===   Key Bindings     ===
# ==========================
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind r source-file ~/.tmux.conf \; display "Config Reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style Pane Selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane Resizing (Prefix + Shift + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy Mode (Vim Style)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==========================
# ===   THEME & UI       ===
# ==========================

# 1. pane borders (Darker grey for inactive, bright cyan for active)
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=cyan

# 2. Status Bar Position & Style
set -g status-position bottom
set -g status-justify left
set -g status-style bg=colour234,fg=white # Dark grey background

# 3. Left Side: Session Name
set -g status-left-length 50
set -g status-left "#[bg=cyan,fg=black,bold] #S #[bg=default,fg=cyan] "

# 4. Right Side: Time & Date + PREFIX Indicator
# The #{?client_prefix...} block shows a yellow "LISTENING" tag when you press Ctrl-a
set -g status-right-length 50
set -g status-right "#[fg=yellow,bold]#{?client_prefix, LISTENING ,}#[default] #[fg=brightblack] %d-%b #[fg=white,bold] %H:%M "

# 5. Window Tabs (The middle part)
# Inactive windows: Dimmed
set -g window-status-format "#[fg=colour244,bg=default] #I:#W "
# Active window: White text, underlined/bold to pop
set -g window-status-current-format "#[fg=white,bold,bg=default] #I:#W "

# 6. Command Line / Message Bar (when you type :command)
set -g message-style bg=cyan,fg=black,bold


# ==========================
# ===   TMUX CHEATSHEET  ===
# ==========================
#
# PREFIX Key :: Ctrl-a
#
# --- Sessions & Config ---
# Reload Config        :: PREFIX + r
# Rename Session       :: PREFIX + $
# Detach Session       :: PREFIX + d
#
# --- Window Management ---
# Create Window        :: PREFIX + c
# Rename Window        :: PREFIX + ,
# Close Window         :: PREFIX + &
# Previous Window      :: PREFIX + p
# Next Window          :: PREFIX + n
# Select Window 1-9    :: PREFIX + 1-9
#
# --- Pane Management ---
# Split Vertical       :: PREFIX + |
# Split Horizontal     :: PREFIX + -
# Zoom/Unzoom Pane     :: PREFIX + z
# Kill Pane            :: PREFIX + x
#
# --- Pane Navigation (Vim) ---
# Move Left            :: PREFIX + h
# Move Down            :: PREFIX + j
# Move Up              :: PREFIX + k
# Move Right           :: PREFIX + l
#
# --- Pane Resizing (Hold Shift) ---
# Resize Left          :: PREFIX + H  (Repeatable)
# Resize Down          :: PREFIX + J  (Repeatable)
# Resize Up            :: PREFIX + K  (Repeatable)
# Resize Right         :: PREFIX + L  (Repeatable)
#
# --- Copy Mode (Vim Style) ---
# Enter Copy Mode      :: PREFIX + [
# Quit Copy Mode       :: q
#
# Inside Copy Mode:
#   Move Cursor        :: h, j, k, l
#   Start Selection    :: v
#   Copy Selection     :: y
#   Paste Buffer       :: PREFIX + ]
