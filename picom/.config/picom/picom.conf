#############################################
# PICOM CONFIG — CLEAN / SIMPLE / STABLE
#############################################

#############################################
# OPACITY
#############################################

# Active window opacity
active-opacity = 0.95;

# Inactive window dimming
inactive-dim = 0.20;

# Respect application-set opacity
detect-client-opacity = true;


#############################################
# ROUNDED CORNERS
#############################################

corner-radius = 10;

# Example:
# rounded-corners-exclude = [
#   "class_g = 'Dunst'"
# ];

rounded-corners-exclude = [
    "window_type = 'dock'",
    "class_g = 'dwm'",
    "class_g = 'dmenu'"
];

#############################################
# BLUR
#############################################

blur:
{
    method = "dual_kawase";
    size = 8;
    strength = 4;
};

blur-background = true;
blur-background-fixed = true;
blur-background-exclude = [
    "class_g = 'slop'"
];

#############################################
# SHADOWS
#############################################

shadow = true;

shadow-radius = 8;
shadow-opacity = 0.25;

shadow-offset-x = -5;
shadow-offset-y = -5;

shadow-color = "#393943";

# Prevent ugly shadows on bars/docks/etc
shadow-exclude = [
    "window_type = 'dock'",
    "class_g = 'dwm'",
    "name = 'Notification'"
];


#############################################
# FADING
#############################################

fading = true;

fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;


#############################################
# BACKEND / PERFORMANCE
#############################################

backend = "glx";

glx-no-stencil = true;
glx-copy-from-front = false;

vsync = true;
use-damage = true;
dithered-present = false;


#############################################
# WINDOW DETECTION
#############################################

detect-rounded-corners = false;
use-ewmh-active-win = true;
detect-transient = true;

log-level = "warn";


#############################################
# WINDOW RULES
#############################################

rules = (

    #########################################
    # Focused / Unfocused Windows
    #########################################

    { match = "focused"; opacity = 0.85; },

    { match = "!focused"; opacity = 0.75; },


    #########################################
    # Menus / Tooltips
    #########################################

    {
        match = "tooltip";
        fade = true;
        shadow = true;
        opacity = 0.90;
        focus = true;
        full-shadow = false;
    },

    {
        match = "popup_menu";
        opacity = 0.90;
    },

    {
        match = "dropdown_menu";
        opacity = 0.90;
    },


    #########################################
    # Qutebrowser Special Shadow
    #########################################

    {
        match = "class_g = 'qutebrowser'";
        shadow = true;
        full-shadow = true;
    },


    #########################################
    # No Blur For Utility Windows
    #########################################

    {
        match = "class_g *?= 'slop'";
        blur-background = false;
        opacity = 1;
        focus = true;
    },

    {
        match = "class_g *?= 'screenkey'";
        blur-background = false;
        opacity = 1;
        focus = true;
    }
);

#############################################
# START COMMAND
#############################################

# Start with:
# picom -b
#
# Debug with:
# picom --diagnostics
#############################################
